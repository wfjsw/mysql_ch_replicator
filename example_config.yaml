
# MySQL and ClickHouse credentials can be overridden using environment variables:
# MySQL: MYSQL_HOST, MYSQL_PORT, MYSQL_USER, MYSQL_PASSWORD, MYSQL_CHARSET
# ClickHouse: CLICKHOUSE_HOST, CLICKHOUSE_PORT, CLICKHOUSE_USER, CLICKHOUSE_PASSWORD

mysql:
  host: 'localhost'
  port: 8306
  user: 'root'
  password: 'root'
  charset: 'utf8mb4'  # Optional: charset for MySQL connection (default: utf8mb4). Use utf8mb4 for full Unicode support including emoji and 4-byte characters

clickhouse:
  host: 'localhost'
  port: 8323
  user: 'default'
  password: 'default'
  max_unfinished_mutations_to_wait: 900  # Optional: wait before issuing more DELETE mutations when a table has this many unfinished mutations
  mutation_backpressure_sleep: 10        # Optional: seconds to sleep while waiting for mutation backlog to drain

binlog_replicator:
  data_dir: '/home/user/binlog/'
  records_per_file: 100000

databases: 'database_name_pattern_*'

realtime_insert_flush_interval: 1        # Optional: seconds between realtime insert flushes
realtime_delete_flush_interval: 60       # Optional: seconds between realtime delete flushes; increase to reduce ClickHouse mutation frequency
realtime_insert_flush_batch_size: 100000 # Optional: buffered records that force an insert flush
realtime_delete_flush_batch_size: 100000 # Optional: buffered primary keys that force a delete flush
